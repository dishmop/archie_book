<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupled Pendulums with Spring</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      font-family: "Times New Roman", Times, serif;
    }

    .figure {
      width: 960px;
      max-width: 96vw;
      aspect-ratio: 960 / 596;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .thin { stroke: #111; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .med { stroke: #111; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .heavy { stroke: #111; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .guide { stroke: #111; stroke-width: 2; fill: none; stroke-linecap: round; }
    .mass { fill: #111; }
    .label { font-size: 42px; font-style: italic; fill: #111; }
    .small-label { font-size: 40px; font-style: italic; fill: #111; }
  </style>
</head>
<body>
  <div class="figure">
    <svg viewBox="0 0 960 596" aria-label="Two pendulums of length l with masses m coupled by a spring k, angles theta one and theta two, horizontal displacements eta one and eta two, and separation d.">

        <line x1="278" y1="63" x2="266" y2="37" />
        <line x1="291" y1="63" x2="279" y2="37" />

      <circle class="mass" cx="286" cy="385" r="11" />

      <path class="thin" d="M676 232 A165 165 0 0 0 730 223" marker-end="url(#arrow)" />
          <!-- eta vertical projection ticks -->
      <line class="guide" x1="286" y1="385" x2="286" y2="537" />
      <line class="guide" x1="787" y1="386" x2="787" y2="537" />

</body>
</html>
