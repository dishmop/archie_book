<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Polarization — Sun at Zenith</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #ffffff;
    color: #000000;
    min-height: 100vh;
  }

  body {
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .diagram {
    width: 100%;
    max-width: 560px;
    aspect-ratio: 1;
  }

  svg { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
  <div class="diagram">
    <svg id="sky" viewBox="-220 -220 440 440" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowEnd" viewBox="0 0 10 10" refX="5" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,1.5 L5,5 L0,8.5 Z" fill="#000"/>
        </marker>
        <marker id="arrowStart" viewBox="0 0 10 10" refX="5" refY="5"
                markerWidth="6" markerHeight="6" orient="auto">
          <path d="M10,1.5 L5,5 L10,8.5 Z" fill="#000"/>
        </marker>

        <radialGradient id="sunBody" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#fff4b8"/>
          <stop offset="55%"  stop-color="#ffd23a"/>
          <stop offset="100%" stop-color="#f5a615"/>
        </radialGradient>
        <radialGradient id="sunHalo" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#ffd23a" stop-opacity="0.55"/>
          <stop offset="60%"  stop-color="#ffd23a" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#ffd23a" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- Horizon -->
      <circle cx="0" cy="0" r="180" fill="none" stroke="#000" stroke-width="1.2"/>

      <!-- Cardinal labels -->
      <g font-family="Cormorant Garamond, serif" font-style="italic" font-size="22" fill="#000">
        <text x="0"    y="-198" text-anchor="middle">N</text>
        <text x="0"    y="214"  text-anchor="middle">S</text>
        <text x="-200" y="7"    text-anchor="end">E</text>
        <text x="200"  y="7"    text-anchor="start">W</text>
      </g>

      <!-- E-vectors are drawn by script below -->
      <g id="evectors"></g>

      <!-- Sun glow (halo) -->
      <circle cx="0" cy="0" r="26" fill="url(#sunHalo)"/>

      <!-- Sun body -->
      <g id="sun">
        <!-- Rays -->
        <g stroke="#f5a615" stroke-width="2" stroke-linecap="round" id="sunRays"></g>
        <!-- Disk -->
        <circle cx="0" cy="0" r="11" fill="url(#sunBody)" stroke="#d68a08" stroke-width="0.8"/>
      </g>
    </svg>
  </div>

<script>
  // -------- E-vectors, generated by loop --------
  // For sun at zenith (centre of disc), e-vectors are tangent to circles centred on the sun.
  // For each ring of radius r, place N vectors of length L tangent to that circle.
  const rings = [
    { r:  40, n:  8, len: 22, width: 1.1 },
    { r:  80, n: 12, len: 26, width: 1.3 },
    { r: 120, n: 16, len: 34, width: 1.5 },
    { r: 155, n: 16, len: 26, width: 1.2 },
  ];

  const svgNS = "http://www.w3.org/2000/svg";
  const evGroup = document.getElementById("evectors");

  rings.forEach(({ r, n, len, width }) => {
    const g = document.createElementNS(svgNS, "g");
    g.setAttribute("stroke", "#000");
    g.setAttribute("stroke-width", width);
    g.setAttribute("stroke-linecap", "round");
    g.setAttribute("marker-start", "url(#arrowStart)");
    g.setAttribute("marker-end", "url(#arrowEnd)");

    for (let i = 0; i < n; i++) {
      // base angle around the sun
      const theta = (2 * Math.PI * i) / n;
      // position on ring
      const px = r * Math.cos(theta);
      const py = r * Math.sin(theta);
      // tangent direction (perpendicular to radial)
      const tx = -Math.sin(theta);
      const ty =  Math.cos(theta);
      // endpoints of the e-vector segment
      const half = len / 2;
      const x1 = px - half * tx;
      const y1 = py - half * ty;
      const x2 = px + half * tx;
      const y2 = py + half * ty;

      const line = document.createElementNS(svgNS, "line");
      line.setAttribute("x1", x1.toFixed(2));
      line.setAttribute("y1", y1.toFixed(2));
      line.setAttribute("x2", x2.toFixed(2));
      line.setAttribute("y2", y2.toFixed(2));
      g.appendChild(line);
    }
    evGroup.appendChild(g);
  });

  // -------- Sun rays, also generated by loop --------
  const raysGroup = document.getElementById("sunRays");
  const rayCount = 12;
  const rInner = 14;
  const rOuter = 20;
  for (let i = 0; i < rayCount; i++) {
    const a = (2 * Math.PI * i) / rayCount;
    const x1 = rInner * Math.cos(a);
    const y1 = rInner * Math.sin(a);
    const x2 = rOuter * Math.cos(a);
    const y2 = rOuter * Math.sin(a);
    const line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", x1.toFixed(2));
    line.setAttribute("y1", y1.toFixed(2));
    line.setAttribute("x2", x2.toFixed(2));
    line.setAttribute("y2", y2.toFixed(2));
    raysGroup.appendChild(line);
  }
</script>
</body>
</html>
